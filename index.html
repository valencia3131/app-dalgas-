<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xfilmedits31arsivv</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .video-card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .btn { padding: 10px 20px; background: #e50914; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>

    <h1>xfilmedits31arsivv</h1>
    <div id="videoList"></div>

    <script>
        // Basit bir örnek video verisi
        let history = JSON.parse(localStorage.getItem('myVideos')) || [];

        function renderVideos() {
            const list = document.getElementById('videoList');
            list.innerHTML = history.map((vid, index) => `
                <div class="video-card">
                    <p>HD 4K Video ${index + 1} 💀</p>
                    <button class="btn" onclick="downloadVideo(${index})">İndir</button>
                    <button class="btn" style="background:#555" onclick="removeVideo(${index})">Sil</button>
                </div>
            `).join('');
        }

        function downloadVideo(index) {
            alert("Video HD 4K olarak indiriliyor...");
            // İndirme sonrası TikTok yönlendirmesi
            setTimeout(() => {
                window.location.href = "https://www.tiktok.com/@xfilmedits31arsivv";
            }, 2000);
        }

        function removeVideo(index) {
            history.splice(index, 1);
            localStorage.setItem('myVideos', JSON.stringify(history));
            renderVideos();
        }

        // Başlangıç için örnek veri ekle
        if(history.length === 0) { history = ["Video 1"]; renderVideos(); }
        renderVideos();
    </script>
</body>
</html>
