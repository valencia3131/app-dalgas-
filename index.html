<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sad Mod - TikTok Downloader</title>
    <style>
        :root {
            --bg: #000000;
            --panel-bg: #0d0d0d;
            --border: #222222;
            --text: #ffffff;
            --sub: #888888;
            --accent: #a855f7; /* Premium Mor */
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 13px;
            color: var(--sub);
            margin-top: 4px;
        }

        /* GİRİŞ ALANI */
        .input-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 15px;
            padding: 8px;
            width: 100%;
        }

        input::placeholder { color: #444; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active { opacity: 0.8; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* YÜKLENİYOR */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 30px 0;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* SONUÇ KARTI */
        .result-card {
            display: none;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-top: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            object-fit: cover;
        }

        .user-info h3 { font-size: 14px; font-weight: 600; }
        .user-info p { font-size: 12px; color: var(--sub); }

        .video-desc {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .download-btn {
            background: var(--success);
            width: 100%;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            margin-top: 8px;
            text-align: center;
        }

        .music-btn {
            background: #222;
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* FOTOĞRAF SLAYT GALERİSİ */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #111;
            border: 1px solid var(--border);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-dl-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            padding: 8px;
            text-align: center;
        }

        .photo-dl-overlay a {
            color: #fff;
            font-size: 12px;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SAD MOD</h1>
        <p>TikTok Video & Fotoğraf Downloader</p>
    </div>

    <div class="input-container">
        <input type="text" id="tiktokUrl" placeholder="TikTok linkini buraya yapıştır kanka...">
        <button id="searchBtn" onclick="downloadTikTok()">Sorgula ve Hazırla</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="font-size: 13px; color: var(--sub);">Yapay zeka linki çözüyor, az bekle...</p>
    </div>

    <div class="result-card" id="resultCard">
        <div class="profile-area">
            <img id="authorImg" class="avatar" src="" alt="">
            <div class="user-info">
                <h3 id="authorName">@username</h3>
                <p id="videoStats">👁️ 0 | ❤️ 0</p>
            </div>
        </div>
        
        <p id="videoTitle" class="video-desc"></p>

        <div id="videoActionArea">
            <button id="downloadVideoBtn" class="download-btn" style="border:none;">📥 Filigransız HD Videoyu İndir</button>
        </div>

        <div id="photoActionArea" style="display: none;">
            <p style="font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px;">📸 Slayt Fotoğrafları Algılandı:</p>
            <div class="photos-grid" id="photosGrid"></div>
        </div>

        <button id="downloadMusicBtn" class="download-btn music-btn" style="margin-top: 12px;">🎵 Sadece Sesi İndir (MP3)</button>
    </div>

    <script>
        // Tarayıcılar ve WebIntoApp üzerinde indirmeyi doğrudan tetikleyen jilet fonksiyon
        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function downloadTikTok() {
            const urlInput = document.getElementById('tiktokUrl').value.trim();
            const searchBtn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');

            if (!urlInput) {
                alert('Boş linki neyleyeyim kanka, düzgün bi TikTok linki yapıştır!');
                return;
            }

            // Ekranı temizle
            searchBtn.disabled = true;
            loader.style.display = 'flex';
            resultCard.style.display = 'none';
            document.getElementById('photoActionArea').style.display = 'none';
            document.getElementById('videoActionArea').style.display = 'none';
            document.getElementById('photosGrid').innerHTML = '';

            try {
                // TikTok şifrelemesini anlık kıran en güncel stabil global API
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const json = await response.json();

                if (json.code !== 0 || !json.data) {
                    alert('Hata! Link geçersiz veya video gizli olabilir kanka. Kontrol et.');
                    searchBtn.disabled = false;
                    loader.style.display = 'none';
                    return;
                }

                const data = json.data;

                // Profil ve istatistik basımı
                document.getElementById('authorImg').src = data.author.avatar || 'https://www.tiktok.com/favicon.ico';
                document.getElementById('authorName').innerText = `@${data.author.unique_id || 'tiktok_user'}`;
                document.getElementById('videoStats').innerText = `👁️ ${data.play_count.toLocaleString()} | ❤️ ${data.digg_count.toLocaleString()}`;
                document.getElementById('videoTitle').innerText = data.title || 'TikTok Gönderisi';

                // Video mu fotoğraf slaytı mı kontrol et
                if (data.images && data.images.length > 0) {
                    // Fotoğraf Slaytı
                    document.getElementById('photoActionArea').style.display = 'block';
                    const grid = document.getElementById('photosGrid');
                    
                    data.images.forEach((imgUrl, index) => {
                        const item = document.createElement('div');
                        item.className = 'photo-item';
                        item.innerHTML = `
                            <img src="${imgUrl}" alt="Fotoğraf">
                            <div class="photo-dl-overlay">
                                <a href="#" onclick="event.preventDefault(); triggerDownload('${imgUrl}', 'sad_mod_photo_${index+1}.jpg')">Fotoğrafı İndir</a>
                            </div>
                        `;
                        grid.appendChild(item);
                    });
                } else {
                    // Normal Video
                    document.getElementById('videoActionArea').style.display = 'block';
                    // Video butonuna tıklama olayını bağlıyoruz (İndirme engeline takılmaması için)
                    document.getElementById('downloadVideoBtn').onclick = function() {
                        triggerDownload(data.play, 'sad_mod_tiktok.mp4');
                    };
                }

                // MP3 Ses İndirme Butonu Ayarı
                if (data.music_info && data.music_info.play) {
                    document.getElementById('downloadMusicBtn').style.display = 'flex';
                    document.getElementById('downloadMusicBtn').onclick = function() {
                        triggerDownload(data.music_info.play, 'sad_mod_audio.mp3');
                    };
                } else {
                    document.getElementById('downloadMusicBtn').style.display = 'none';
                }

                // Panel Aç
                loader.style.display = 'none';
                resultCard.style.display = 'block';

            } catch (error) {
                alert('Sunucuyla bağlantı kurulamadı, internetini kontrol et kanka.');
                console.error(error);
            } finally {
                searchBtn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
