<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xfilmedits31arsivv Downloader</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 400px; margin-top: 20px; text-align: center; }
        h1 { font-size: 24px; color: #ff0050; }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: #222; color: white; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .mp4-btn { background: #ff0050; }
        .mp3-btn { background: #00f2ea; color: black; }
        .history-section { margin-top: 30px; width: 100%; border-top: 1px solid #333; padding-top: 20px; }
        .reel-card { background: #1a1a1a; margin-bottom: 20px; padding: 15px; border-radius: 15px; position: relative; }
        .delete-btn { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>xfilmedits31arsivv 💀</h1>
    <input type="text" id="url" class="input-box" placeholder="TikTok Linkini Yapıştır...">
    
    <div class="btn-group">
        <button class="btn mp4-btn" onclick="process('MP4')">MP4 İNDİR (HD)</button>
        <button class="btn mp3-btn" onclick="process('MP3')">MP3 İNDİR</button>
    </div>

    <div class="history-section">
        <h2>Geçmiş Kayıtlar</h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    function process(type) {
        const url = document.getElementById('url').value;
        if(!url) return alert("Link lazım kanka!");

        // Geçmişe ekle
        let history = JSON.parse(localStorage.getItem('myVideos')) || [];
        history.unshift({ url: url, type: type, date: new Date().toLocaleTimeString() });
        localStorage.setItem('myVideos', JSON.stringify(history));

        alert("Video hazırlanıyor... Sayfama yönlendiriliyorsun! 💀");
        renderHistory();
        window.location.href = "https://www.tiktok.com/@xfilmedits31arsivv";
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        let history = JSON.parse(localStorage.getItem('myVideos')) || [];
        list.innerHTML = history.map((item, i) => `
            <div class="reel-card">
                <p>Format: ${item.type}</p>
                <p style="font-size: 12px; color: #888;">${item.date}</p>
                <button class="delete-btn" onclick="remove(${i})">Sil 🗑️</button>
            </div>
        `).join('');
    }

    renderHistory();

    function remove(i) {
        let history = JSON.parse(localStorage.getItem('myVideos')) || [];
        history.splice(i, 1);
        localStorage.setItem('myVideos', JSON.stringify(history));
        renderHistory();
    }
</script>
</body>
</html>
