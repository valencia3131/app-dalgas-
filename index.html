<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sihirli Akıllı PNG Yapıcı</title>
    <style>
        :root {
            --bg: #000000;
            --panel-bg: #0d0d0d;
            --border: #222222;
            --text: #ffffff;
            --sub: #888888;
            --accent: #a855f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* ===================== ÜST BAR (GERİ/İLERİ AL) ===================== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            padding-top: env(safe-area-inset-top);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ===================== TİKTOK TARZI ORTA ALAN ===================== */
        .main-container {
            position: absolute;
            top: 60px;
            bottom: 250px;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .tiktok-upload-btn {
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .tiktok-upload-btn svg { width: 44px; height: 44px; fill: var(--text); }
        .tiktok-upload-btn span { font-size: 14px; font-weight: 600; color: var(--sub); }

        .editor-workspace {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            align-items: center;
            justify-content: center;
        }
        .editor-workspace.active { display: flex; }

        /* Gerçek Transparan Kareli Fon */
        .canvas-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                              linear-gradient(-45deg, #222 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #222 75%), 
                              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-color: #111;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas { display: block; max-width: 100%; max-height: 100%; }

        /* ===================== ALT KONTROL PANELİ ===================== */
        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 250px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
        }

        .sliders-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-group label { width: 100px; font-size: 13px; font-weight: 600; color: var(--sub); }
        .slider-group input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #222;
            border-radius: 3px;
            outline: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .magic-btn {
            flex: 1;
            background: #1e1b4b;
            border: 1px solid #4338ca;
            color: #c7d2fe;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .save-btn:disabled, .magic-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- ÜST BAR -->
    <div class="top-bar">
        <button class="nav-btn" id="undoBtn" onclick="undo()" disabled>↩️ Geri Al</button>
        <div style="font-size: 14px; font-weight: 700; color: var(--sub)">AKILLI SİHİRLİ PNG</div>
        <button class="nav-btn" id="redoBtn" onclick="redo()" disabled>İleri Al ↪️</button>
    </div>

    <!-- ORTA ALAN -->
    <div class="main-container">
        <!-- TikTok Tarzı Buton -->
        <label class="tiktok-upload-btn" id="uploadPanel" for="fileInput">
            <svg viewBox="0 0 24 24">
                <path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86l-3 3.87L9 13.14 6 17h12l-3.86-5.14z"/>
            </svg>
            <span>Resim Seç</span>
        </label>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="loadImage(event)">

        <!-- Editör -->
        <div class="editor-workspace" id="editorWorkspace">
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- ALT PANEL -->
    <div class="bottom-panel">
        <div class="sliders-grid">
            <div class="slider-group">
                <label>🎯 Temizleme Gücü</label>
                <input type="range" id="tolerance" min="5" max="80" value="30">
            </div>
            <div class="slider-group">
                <label>☀️ Parlaklık</label>
                <input type="range" id="brightness" min="50" max="150" value="100" oninput="updateFilters()">
            </div>
            <div class="slider-group">
                <label>🌗 Kontrast</label>
                <input type="range" id="contrast" min="50" max="150" value="100" oninput="updateFilters()">
            </div>
            <div class="slider-group">
                <label>👻 Opaklık</label>
                <input type="range" id="opacity" min="0" max="100" value="100" oninput="updateFilters()">
            </div>
        </div>

        <div class="btn-group">
            <button class="magic-btn" id="magicBtn" onclick="autoRemoveBackground()" disabled>🪄 Sihirli Temizle</button>
            <button class="save-btn" id="saveBtn" onclick="savePNG()" disabled>PNG Kaydet</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        
        let loadedImage = new Image();
        let historyStack = [];
        let historyIndex = -1;

        function loadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                loadedImage.onload = function() {
                    const maxW = window.innerWidth - 32;
                    const maxH = window.innerHeight - 330;
                    let w = loadedImage.width;
                    let h = loadedImage.height;

                    if (w > maxW || h > maxH) {
                        const ratio = Math.min(maxW / w, maxH / h);
                        w = w * ratio;
                        h = h * ratio;
                    }
                    canvas.width = w;
                    canvas.height = h;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(loadedImage, 0, 0, canvas.width, canvas.height);

                    document.getElementById('uploadPanel').style.display = 'none';
                    // DÜZELTME: Doğru id ile editor workspace aktif yapılıyor
                    document.getElementById('editorWorkspace').classList.add('active');
                    document.getElementById('magicBtn').disabled = false;
                    document.getElementById('saveBtn').disabled = false;

                    historyStack = [];
                    historyIndex = -1;
                    saveState();
                }
                loadedImage.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function saveState() {
            if (historyIndex < historyStack.length - 1) {
                historyStack = historyStack.slice(0, historyIndex + 1);
            }
            historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            historyIndex++;
            updateUndoRedoButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                ctx.putImageData(historyStack[historyIndex], 0, 0);
                updateUndoRedoButtons();
            }
        }

        function redo() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                ctx.putImageData(historyStack[historyIndex], 0, 0);
                updateUndoRedoButtons();
            }
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = (historyIndex <= 0);
            document.getElementById('redoBtn').disabled = (historyIndex >= historyStack.length - 1);
        }

        // ===================== AKILLI RENK ALGINALAN ARKA PLAN SİLME ALGORİTMASI =====================
        function autoRemoveBackground() {
            const tolerance = parseInt(document.getElementById('tolerance').value);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const width = canvas.width;
            const height = canvas.height;

            // Köşelerdeki baskın renk piksellerini referans alıyoruz (Sol üst, sağ üst, sol alt, sağ alt)
            const corners = [
                getPixelColor(data, 0, 0, width),
                getPixelColor(data, width - 1, 0, width),
                getPixelColor(data, 0, height - 1, width),
                getPixelColor(data, width - 1, height - 1, width)
            ];

            // Tüm pikselleri tara, köşelerdeki renklere benzeyenleri transparan yap
            for (let i = 0; i < data.length; i += 4) {
                // Eğer zaten şeffafsa geç
                if (data[i + 3] === 0) continue;

                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                let matchFound = false;
                for (let j = 0; j < corners.length; j++) {
                    const target = corners[j];
                    const distance = Math.sqrt(
                        Math.pow(r - target.r, 2) +
                        Math.pow(g - target.g, 2) +
                        Math.pow(b - target.b, 2)
                    );

                    if (distance < tolerance) {
                        matchFound = true;
                        break;
                    }
                }

                if (matchFound) {
                    data[i + 3] = 0; // Pikseli tamamen şeffaf yap (PNG katmanı)
                }
            }

            ctx.putImageData(imgData, 0, 0);
            saveState(); // Yapılan işlemi geçmişe kaydet
        }

        function getPixelColor(data, x, y, width) {
            const index = (y * width + x) * 4;
            return { r: data[index], g: data[index + 1], b: data[index + 2] };
        }

        function updateFilters() {
            const b = document.getElementById('brightness').value;
            const c = document.getElementById('contrast').value;
            const o = document.getElementById('opacity').value / 100;

            canvas.style.filter = `brightness(${b}%) contrast(${c}%)`;
            canvas.style.opacity = o;
        }

        // ===================== CAM GİBİ BOMLOŞ PNG KAYDETME =====================
        function savePNG() {
            if (historyStack.length === 0) return;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            const b = document.getElementById('brightness').value;
            const c = document.getElementById('contrast').value;
            const o = document.getElementById('opacity').value / 100;

            // Canvas'ın içerik verisini filtreleyerek yeni bir canvas'a çiziyoruz
            tempCtx.filter = `brightness(${b}%) contrast(${c}%)`;
            tempCtx.globalAlpha = o;
            tempCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = 'sad_mod_clean.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
